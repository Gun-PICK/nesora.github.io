<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

<title>NESORA 管理端末</title>

<style>

body{
    margin:0;
    background:#000;
    color:#7FFFD4;
    font-family:"DotGothic16", monospace;
    padding:30px;
}

h1{
    font-size:30px;
    text-shadow:0 0 10px #7FFFD4;
}

.card{
    margin-top:20px;
    padding:15px;
    border:1px solid #7FFFD4;
    background:rgba(127,255,212,.05);
}

.card hr{
    border:none;
    border-top:1px solid #7FFFD4;
}

.small{
    color:#8aa;
    font-size:14px;
}

</style>
</head>

<body>

<h1>NESORA INTERNAL TERMINAL</h1>

<p class="small">
管理者権限認証済み<br>
お問い合わせアーカイブ
</p>

<div id="archive"></div>

<script>

const archive = JSON.parse(localStorage.getItem("archive")) || [];

const box = document.getElementById("archive");

if(archive.length === 0){

    box.innerHTML = "<p>記録はありません。</p>";

}else{

    archive.forEach((item,index)=>{

        box.innerHTML += `
        <div class="card">
            <b>No.${String(index+1).padStart(5,"0")}</b><br><br>

            日時：${item.date}<br><br>

            名前：${item.name}<br><br>

            内容：<br>
            ${item.message.replace(/\n/g,"<br>")}

            <hr>
        </div>
        `;

    });

}

</script>

</body>
</html>
