<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

<title>受付完了 | ネソラ本店</title>

<style>

body {
    margin: 0;
    height: 100vh;

    background-image: url("nesora_bg.png");
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    background-color: #000;

    display: flex;
    justify-content: center;
    align-items: center;

    color: white;

    font-family: "DotGothic16", sans-serif;

    overflow: hidden;
    position: relative;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    pointer-events:none;
    z-index:0;
}

body::after{
    content:"";
    position:fixed;
    inset:0;
    background-image:url("bg-static01.gif");
    background-size:cover;
    background-repeat:no-repeat;
    opacity:0.08;
    pointer-events:none;
    z-index:1;
}

.message{
    position:relative;
    z-index:2;

    font-family:"DotGothic16", monospace;
    font-weight:bold;

    font-size:28px;
    letter-spacing:4px;

    color:#d8fff2;

    opacity:0;

    animation:fadein 4s forwards;

    text-shadow:
    0 0 5px #7FFFD4,
    0 0 15px #42D9B8;
}

@keyframes fadein{

    0%{
        opacity:0;
        transform:translateY(30px);
    }

    100%{
        opacity:1;
        transform:translateY(0);
    }

}

@media (max-width:600px){

    body{
        background-size:90%;
    }

    .message{
        font-size:48px;
        letter-spacing:1px;
        line-height:1.5;
        text-align:center;
        padding:0 20px;
    }

}

</style>

</head>


<body>


<div class="message">
    正常に処理されました。
</div>


</body>

</html>
