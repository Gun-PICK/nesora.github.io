<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>受付完了 | ネソラ本店</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    height: 100vh;
    
    background-image: url("nesora_bg.png");
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    background-color: #000;
    
    display: flex;
    justify-content: center;
    align-items: center;
    
    color: white;
    
    font-family: "M PLUS Rounded 1c", sans-serif;
    
    overflow: hidden;
}


/* 背景を暗くする */
body::before{
    content:"";
    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.6);

    z-index:0;
}


/* ノイズ */
body::after{
    content:"";
    position:fixed;
    inset:0;

    background-image:url("bg-static01.gif");
    opacity:0.08;

    pointer-events:none;

    z-index:1;
}


/* メッセージ */
.message{
    position:relative;
    z-index:2;

    font-size:26px;
    letter-spacing:6px;

    opacity:0;

    animation:fadein 4s forwards;

    text-shadow:
    0 0 10px white,
    0 0 20px #7FFFD4,
    0 0 40px #42D9B8;
}

@keyframes fadein{

    0%{
        opacity:0;
        transform:translateY(30px);
    }

    100%{
        opacity:1;
        transform:translateY(0);
    }

}


</style>

</head>


<body>


<div class="message">
    正常に処理されました。
</div>


</body>

</html>
