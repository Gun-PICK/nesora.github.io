<h2>お問い合わせ</h2>

<p>
ネソラ本店へのご意見・ご質問は、<br>
下記フォームよりお願いいたします。
</p>

<p>

館内サービスについてのお尋ねなどを受け付けております。
</p>

<h3 class="character-title">お問い合わせフォーム</h3>

<form action="hagino.html" method="get">
  
  <p>
    <label>お名前</label><br>
    <input type="text" name="name">

    <label>お問い合わせ内容</label><br>
    <textarea name="message"></textarea>

    <button type="submit">送信</button>
  </p>
  
</form>
